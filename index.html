<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRE Vocabulary Command Center</title>
    <style>
        :root {
            --bg-main: #faf9f6;
            --bg-canvas: #ffffff;
            --bg-accent: #f4f1eb;
            --text-main: #2d2924;
            --text-muted: #706961;
            --border-color: #e6e1da;
            --border-focus: #c5b39a;
            
            --primary: #8c7863;
            --primary-hover: #73614e;
            --secondary: #e26d5c;
            --secondary-hover: #ca5747;
            
            --color-known: #52b788;
            --color-known-bg: #effbf5;
            --color-delayed: #ee9b00;
            --color-delayed-bg: #fef9ec;
            --color-unknown: #ca6702;
            --color-unknown-bg: #fdf2e6;
            --color-unseen: #9b9389;
            --color-unseen-bg: #f4f3f0;
            
            --tone-pos: #4cc9f0;
            --tone-neg: #f72585;
            --tone-neu: #7209b7;
        }

        body { 
            background-color: var(--bg-main); 
            margin: 0; 
            padding: 16px; 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .gre-widget-container { 
            background-color: var(--bg-canvas); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(44, 39, 32, 0.03), 0 1px 3px rgba(44, 39, 32, 0.02);
            max-width: 1200px; 
            margin: 20px auto; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; 
        }

        .gre-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            margin-bottom: 28px; 
        }

        .controls-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            width: 100%; 
            align-items: center; 
        }

        .gre-search-bar { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid var(--border-color); 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            border-radius: 10px; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s ease;
            box-sizing: border-box; 
        }

        .gre-search-bar:focus { 
            border-color: var(--border-focus); 
            background-color: var(--bg-canvas);
            box-shadow: 0 0 0 3px rgba(197, 179, 154, 0.15);
        }
        
        .multi-select-dropdown { position: relative; flex: 1 1 calc(20% - 10px); min-width: 165px; box-sizing: border-box; }
        .dropdown-button { width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 10px; background-color: var(--bg-canvas); color: var(--text-main); font-size: 14px; text-align: left; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-sizing: border-box; font-weight: 500; transition: all 0.15s ease; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-button:hover:not(:disabled) { border-color: var(--border-focus); background-color: var(--bg-main); }
        .dropdown-button::after { content: "▾"; font-size: 11px; color: var(--text-muted); margin-left: 6px; }
        .dropdown-content { display: none; position: absolute; background-color: var(--bg-canvas); min-width: 230px; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); z-index: 10; max-height: 280px; overflow-y: auto; padding: 6px; box-sizing: border-box; margin-top: 6px; }
        .multi-select-dropdown.open .dropdown-content { display: block; }
        .dropdown-option { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; border-radius: 6px; font-size: 13.5px; color: var(--text-main); transition: background-color 0.1s ease; }
        .dropdown-option:hover { background-color: var(--bg-accent); }
        .dropdown-option input { cursor: pointer; margin: 0; width: 15px; height: 15px; accent-color: var(--primary); }
        
        .gre-filter-select-mode { flex: 1 1 160px; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 10px; background-color: var(--bg-canvas); color: var(--text-main); font-size: 14px; font-weight: 500; cursor: pointer; outline: none; transition: border-color 0.15s; }
        .gre-filter-select-mode:focus { border-color: var(--border-focus); }
        
        .gre-sync-badge { background-color: var(--bg-accent); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--text-muted); }
        .sync-input { border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 4px; font-size: 13px; background: var(--bg-canvas); color: var(--text-main); font-weight: 500; outline: none; width: 100px; transition: border-color 0.15s; }
        .sync-input:focus { border-color: var(--border-focus); }
        
        .btn-container { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; margin-top: 4px; }
        .gre-btn { flex: 1 1 130px; padding: 12px 16px; color: white; border: none; border-radius: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; box-sizing: border-box; min-height: 44px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .gre-btn-filter { background-color: var(--secondary); font-size: 14.5px; font-weight: 700; flex: 2 1 200px; letter-spacing: 0.3px; }
        .gre-btn-filter:hover:not(:disabled) { background-color: var(--secondary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(226, 109, 92, 0.25); }
        .gre-btn-sync { background-color: #588157; }
        .gre-btn-sync:hover { background-color: #3a5a40; }
        .gre-btn-random { background-color: #4a5759; }
        .gre-btn-random.active { background-color: #212529; }
        .gre-btn-cloud-save { background-color: #4895ef; }
        .gre-btn-cloud-save:hover { background-color: #3f37c9; }
        .gre-btn-cloud-load { background-color: #560bad; }
        .gre-btn-cloud-load:hover { background-color: #3a0ca3; }
        
        .gre-btn-session-save { background-color: #d946ef; }
        .gre-btn-session-save:hover { background-color: #a21caf; }
        .gre-btn-session-load { background-color: #db2777; }
        .gre-btn-session-load:hover { background-color: #9d174d; }

        .gre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* Fixed Left Alignment Architecture for Study Cards (Stops Center bleeding) */
        .gre-card { background-color: var(--bg-canvas); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; display: flex !important; flex-direction: column !important; position: relative; box-sizing: border-box; text-align: left !important; justify-content: flex-start !important; align-items: stretch !important; transition: all 0.2s ease; }
        .gre-card * { text-align: left !important; }
        .gre-card:hover { border-color: var(--border-focus); box-shadow: 0 6px 24px rgba(44,39,32,0.04); }
        .gre-card-header { display: flex !important; justify-content: space-between !important; align-items: flex-start !important; margin-bottom: 10px; gap: 8px; width: 100%; }
        .gre-word { font-size: 21px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.3px; }
        .gre-tags-row { display: flex !important; gap: 6px; margin-bottom: 12px; align-items: center !important; flex-wrap: wrap; width: 100%; justify-content: flex-start !important; }
        
        .gre-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px; white-space: nowrap; color: #fff; display: inline-block; }
        .gre-badge.positive { background-color: var(--tone-pos); }
        .gre-badge.negative { background-color: var(--tone-neg); }
        .gre-badge.neutral { background-color: var(--tone-neu); }
        
        .mem-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; white-space: nowrap; border: 1px solid transparent; display: inline-block; }
        .mem-badge.known { background-color: var(--color-known-bg); color: var(--color-known); border-color: rgba(82, 183, 136, 0.2); }
        .mem-badge.delayed { background-color: var(--color-delayed-bg); color: var(--color-delayed); border-color: rgba(238, 155, 0, 0.2); }
        .mem-badge.unknown { background-color: var(--color-unknown-bg); color: var(--color-unknown); border-color: rgba(202, 103, 2, 0.2); }
        .mem-badge.unseen { background-color: var(--color-unseen-bg); color: var(--color-unseen); border-color: rgba(155, 147, 137, 0.15); }
        
        .gre-def { font-size: 14.5px; color: var(--text-main); margin: 0 0 10px 0; line-height: 1.4; font-style: italic; }
        .gre-collocation { font-size: 13px; color: #3a5a40; background-color: #edf5ef; padding: 6px 12px; border-radius: 6px; font-weight: 600; margin-bottom: 14px; display: inline-block; word-break: break-word; }
        .gre-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin: 12px 0 5px 0; letter-spacing: 0.8px; }
        .gre-context-box { font-size: 13px; color: var(--text-main); background-color: #fffaf0; border-left: 3px solid var(--secondary); padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 0 0 12px 0; line-height: 1.45; }
        .gre-mnemonic { font-size: 13.5px; color: #1d4ed8; font-weight: 500; background-color: #f0f4ff; padding: 7px 12px; border-radius: 6px; margin: 0 0 12px 0; line-height: 1.4; }
        .gre-vis { font-size: 13px; color: #4a453f; margin: 0 0 12px 0; line-height: 1.45; }
        .gre-chips { display: flex !important; flex-wrap: wrap; gap: 5px; margin-top: auto; padding-top: 4px; justify-content: flex-start !important; }
        .gre-chip { background-color: var(--bg-accent); color: var(--text-main); font-size: 12px; padding: 4px 8px; border-radius: 5px; font-weight: 500; border: 1px solid rgba(0,0,0,0.03); display: inline-block; }
        .gre-tag { font-size: 11px; color: var(--text-muted); background-color: var(--bg-main); border: 1px solid var(--border-color); padding: 3px 7px; border-radius: 5px; font-weight: 500; display: inline-block; }
        .gre-tag.group-tag { background-color: var(--bg-accent); font-weight: 600; color: var(--text-main); }
        .no-results { grid-column: 1 / -1; text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 15px; background-color: var(--bg-main); border-radius: 12px; border: 1px dashed var(--border-color); }
        
        /* Dedicated Separated Rules for Intentionally Centered Flashcard Decks */
        .fc-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 10px auto; max-width: 480px; width: 100%; box-sizing: border-box; }
        .fc-card { background: var(--bg-canvas); border: 1px solid var(--border-color); border-radius: 20px; min-height: 360px; width: 100%; padding: 28px; box-shadow: 0 10px 30px rgba(44, 39, 32, 0.04); display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; text-align: center !important; cursor: pointer; box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        .fc-card * { text-align: center !important; }
        .fc-card:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(44, 39, 32, 0.06); border-color: var(--border-focus); }
        
        /* Ensure revealed layouts within flashcards fall back to clean left reads gracefully */
        .fc-card.revealed { align-items: stretch !important; justify-content: flex-start !important; text-align: left !important; }
        .fc-card.revealed * { text-align: left !important; }
        .fc-card.revealed .gre-card-header { display: flex !important; justify-content: space-between !important; }
        .fc-card.revealed .gre-tags-row { display: flex !important; justify-content: flex-start !important; }
        .fc-card.revealed .gre-chips { display: flex !important; justify-content: flex-start !important; }
        
        .fc-front-title { font-size: 38px; font-weight: 800; color: var(--text-main); margin-bottom: 12px; letter-spacing: -1px; word-break: break-all; }
        .fc-hint { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: auto; font-weight: 600; background-color: var(--bg-accent); padding: 4px 10px; border-radius: 20px; display: inline-block; }
        .fc-score-row { display: flex; gap: 8px; width: 100%; margin-top: 14px; }
        .score-btn { flex: 1; padding: 12px 4px; font-size: 13px; font-weight: 700; border: 1px solid transparent; border-radius: 10px; cursor: pointer; text-transform: uppercase; min-height: 44px; transition: all 0.15s; }
        .score-btn.know { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .score-btn.know:hover { background-color: #c8e6c9; }
        .score-btn.delay { background-color: #fff8e1; color: #f57f17; border-color: #ffe082; }
        .score-btn.delay:hover { background-color: #ffe082; }
        .score-btn.dont { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; }
        .score-btn.dont:hover { background-color: #ffcdd2; }
        .fc-navigation { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 16px; gap: 14px; }
        .fc-btn { background-color: var(--bg-canvas); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-main); flex: 1; min-height: 44px; transition: all 0.15s; }
        .fc-btn:hover { border-color: var(--border-focus); background-color: var(--bg-main); }
        .fc-counter { font-size: 13.5px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; width: 100%; }
        .stats-card { border: 1px solid var(--border-color); border-radius: 14px; padding: 22px; box-shadow: none; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; cursor: pointer; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        .stats-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(44,39,32,0.06); }
        .stats-group-title { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main); }
        .stats-metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; font-weight: 600; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(45, 41, 36, 0.4); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; box-sizing: border-box; }
        .modal-overlay.active { display: flex; }
        .modal-content-wrapper { background: var(--bg-canvas); border: 1px solid var(--border-color); border-radius: 20px; max-width: 500px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 24px 50px rgba(0,0,0,0.12); animation: modalFadeIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
        .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-main); border-top-left-radius: 19px; border-top-right-radius: 19px; }
        .modal-title { font-size: 17px; font-weight: 700; color: var(--text-main); margin: 0; }
        .modal-close-btn { background: none; border: none; font-size: 26px; font-weight: 500; color: var(--text-muted); cursor: pointer; padding: 0; line-height: 1; transition: color 0.1s; }
        .modal-close-btn:hover { color: var(--text-main); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .modal-word-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-radius: 10px; border: 1px solid transparent; font-weight: 600; font-size: 14.5px; cursor: pointer; transition: all 0.15s ease; }
        .modal-word-row:hover { transform: translateX(2px); filter: brightness(0.97); }
        .modal-word-row.known { background-color: var(--color-known-bg); color: #1b6843; border-color: rgba(82,183,136,0.15); }
        .modal-word-row.delayed { background-color: var(--color-delayed-bg); color: #8f5c00; border-color: rgba(238,155,0,0.15); }
        .modal-word-row.unknown { background-color: var(--color-unknown-bg); color: #9c3100; border-color: rgba(202,103,2,0.15); }
        .modal-word-row.unseen { background-color: var(--color-unseen-bg); color: #55504a; border-color: rgba(155,147,137,0.1); }
        .modal-status-txt { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; opacity: 0.8; }
        
        .modal-back-btn { background: var(--bg-canvas); border: 1px solid var(--border-color); color: var(--text-main); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
        .modal-back-btn:hover { border-color: var(--border-focus); background-color: var(--bg-main); }
    </style>
</head>
<body>

<div class="gre-widget-container">
    <div class="gre-controls">
        <input type="text" id="greSearch" class="gre-search-bar" placeholder="Search dataset vocabulary...">
        
        <div class="controls-row">
            <select id="greModeFilter" class="gre-filter-select-mode">
                <option value="study">📝 Study Mode</option>
                <option value="flashcard">🎴 Flashcards</option>
                <option value="statistics">📊 Statistics</option>
            </select>
            <select id="greStatsSortFilter" class="gre-filter-select-mode" style="display: none;">
                <option value="know">🥇 Highest Mastery</option>
                <option value="review">🚨 Needs Review</option>
            </select>

            <div class="multi-select-dropdown" id="dropdownMemory">
                <button class="dropdown-button" onclick="toggleDropdown('dropdownMemory')">🧠 Memory States (All)</button>
                <div class="dropdown-content">
                    <label class="dropdown-option"><input type="checkbox" value="unseen" checked> Unseen</label>
                    <label class="dropdown-option"><input type="checkbox" value="known" checked> Known</label>
                    <label class="dropdown-option"><input type="checkbox" value="delayed" checked> Delayed</label>
                    <label class="dropdown-option"><input type="checkbox" value="unknown" checked> Don't Know</label>
                </div>
            </div>

            <div class="multi-select-dropdown" id="dropdownGroup">
                <button class="dropdown-button" onclick="toggleDropdown('dropdownGroup')">📁 Word Groups (All)</button>
                <div class="dropdown-content" id="groupOptionsContainer"></div>
            </div>

            <div class="multi-select-dropdown" id="dropdownCategory">
                <button class="dropdown-button" onclick="toggleDropdown('dropdownCategory')">🏷️ Categories (All)</button>
                <div class="dropdown-content">
                    <label class="dropdown-option"><input type="checkbox" value="Control & Separation" checked> Control & Separation</label>
                    <label class="dropdown-option"><input type="checkbox" value="Speech & Thought" checked> Speech & Thought</label>
                    <label class="dropdown-option"><input type="checkbox" value="Behavior & Traits" checked> Behavior & Traits</label>
                    <label class="dropdown-option"><input type="checkbox" value="Compliance & Accord" checked> Compliance & Accord</label>
                    <label class="dropdown-option"><input type="checkbox" value="Social Dynamics" checked> Social Dynamics</label>
                    <label class="dropdown-option"><input type="checkbox" value="Quantity & State" checked> Quantity & State</label>
                    <label class="dropdown-option"><input type="checkbox" value="General" checked> General / Other</label>
                </div>
            </div>

            <div class="multi-select-dropdown" id="dropdownTone">
                <button class="dropdown-button" onclick="toggleDropdown('dropdownTone')">🎭 Tones (All)</button>
                <div class="dropdown-content">
                    <label class="dropdown-option"><input type="checkbox" value="positive" checked> Positive</label>
                    <label class="dropdown-option"><input type="checkbox" value="negative" checked> Negative</label>
                    <label class="dropdown-option"><input type="checkbox" value="neutral" checked> Neutral</label>
                </div>
            </div>

            <div class="gre-sync-badge">
                👤 Profile ID: <input type="text" id="greUserPin" class="sync-input" value="student1">
            </div>
        </div>

        <div class="btn-container">
            <button class="gre-btn gre-btn-filter" id="greBtnApplyFilter">🔍 Apply Filters</button>
            <button class="gre-btn gre-btn-random" id="greBtnRandom">🔀 Random Off</button>
            <button class="gre-btn gre-btn-sync" id="greBtnSync">🔄 Refresh Word Lists</button>
            <button class="gre-btn gre-btn-cloud-save" id="greBtnCloudSave">☁️ Save Progress</button>
            <button class="gre-btn gre-btn-cloud-load" id="greBtnCloudLoad">☁️ Load Progress</button>
            
            <button class="gre-btn gre-btn-session-save" id="greBtnSessionSave">🔀 Save Session Config</button>
            <button class="gre-btn gre-btn-session-load" id="greBtnSessionLoad">🔀 Load Session Config</button>
        </div>
    </div>
    <div id="greDisplayContainer"></div>
</div>

<div class="modal-overlay" id="statsGroupModal">
    <div class="modal-content-wrapper">
        <div class="modal-header">
            <h3 class="modal-title" id="modalGroupHeaderTitle">Group Summary</h3>
            <div id="modalHeaderActionZone">
                <button class="modal-close-btn" onclick="closeStatsGroupModal()">×</button>
            </div>
        </div>
        <div class="modal-body" id="modalGroupListBody"></div>
    </div>
</div>

<script>
let wordsData = [];
let currentFlashcardIndex = 0;
let flashcardRevealed = false;
let currentFilteredList = [];
let isRandomized = false;
let memoryScores = {};
let lastActiveModalGroupId = null;

const displayContainer = document.getElementById('greDisplayContainer');
const searchInput = document.getElementById('greSearch');
const modeFilter = document.getElementById('greModeFilter');
const statsSortFilter = document.getElementById('greStatsSortFilter');
const userPinInput = document.getElementById('greUserPin');
const btnSync = document.getElementById('greBtnSync');
const btnRandom = document.getElementById('greBtnRandom');
const btnApplyFilter = document.getElementById('greBtnApplyFilter');
const btnCloudSave = document.getElementById('greBtnCloudSave');
const btnCloudLoad = document.getElementById('greBtnCloudLoad');
const btnSessionSave = document.getElementById('greBtnSessionSave');
const btnSessionLoad = document.getElementById('greBtnSessionLoad');
const groupOptionsContainer = document.getElementById('groupOptionsContainer');

const statsGroupModal = document.getElementById('statsGroupModal');
const modalGroupHeaderTitle = document.getElementById('modalGroupHeaderTitle');
const modalGroupListBody = document.getElementById('modalGroupListBody');
const modalHeaderActionZone = document.getElementById('modalHeaderActionZone');

const getApiUrl = (user, type = "state") => {
    const suffix = type === "config" ? "_full_session_config" : "";
    return `/api/state-manager?user=${encodeURIComponent(user + suffix)}`;
};

function toggleDropdown(id) {
    const dropdown = document.getElementById(id);
    const isOpen = dropdown.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) dropdown.classList.add('open');
}

function closeAllDropdowns() {
    document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('open'));
}

window.addEventListener('click', (e) => {
    if (!e.target.closest('.multi-select-dropdown')) closeAllDropdowns();
});

function updateDropdownLabels() {
    const checkCount = (id) => Array.from(document.querySelectorAll(`#${id} .dropdown-content input[type="checkbox"]:checked`)).length;
    const totalCount = (id) => Array.from(document.querySelectorAll(`#${id} .dropdown-content input[type="checkbox"]`)).length;
    const setLabel = (id, baseName) => {
        const checked = checkCount(id);
        const total = totalCount(id);
        const btn = document.querySelector(`#${id} .dropdown-button`);
        if (checked === total) btn.textContent = `${baseName} (All)`;
        else if (checked === 0) btn.textContent = `${baseName} (None)`;
        else btn.textContent = `${baseName} (${checked}/${total})`;
    };
    setLabel('dropdownMemory', '🧠 Memory');
    setLabel('dropdownGroup', '📁 Groups');
    setLabel('dropdownCategory', '🏷️ Categories');
    setLabel('dropdownTone', '🎭 Tones');
}

function saveAppStateToBrowser() {
    const state = {
        search: searchInput.value,
        mode: modeFilter.value,
        randomized: isRandomized,
        flashcardIndex: currentFlashcardIndex,
        scores: memoryScores,
        userPin: userPinInput.value,
        filterMemory: Array.from(document.querySelectorAll('#dropdownMemory input:checked')).map(c=>c.value),
        filterGroup: Array.from(document.querySelectorAll('#dropdownGroup input:checked')).map(c=>c.value),
        filterCategory: Array.from(document.querySelectorAll('#dropdownCategory input:checked')).map(c=>c.value),
        filterTone: Array.from(document.querySelectorAll('#dropdownTone input:checked')).map(c=>c.value),
        savedSequenceWords: isRandomized ? currentFilteredList.map(item => item.word) : []
    };
    localStorage.setItem('gre_vercel_app_state', JSON.stringify(state));
}

function loadAppStateFromBrowser() {
    const saved = localStorage.getItem('gre_vercel_app_state');
    if (!saved) return;
    try {
        const state = JSON.parse(saved);
        searchInput.value = state.search || "";
        modeFilter.value = state.mode || "study";
        userPinInput.value = state.userPin || "student1";
        isRandomized = !!state.randomized;
        currentFlashcardIndex = state.flashcardIndex || 0;
        memoryScores = state.scores || {};
        window.stashedSequenceWords = state.savedSequenceWords || null;

        btnRandom.textContent = isRandomized ? "🔀 Random On" : "🔀 Random Off";
        btnRandom.classList.toggle('active', isRandomized);

        const setChecked = (selector, savedValues) => {
            if (!savedValues) return;
            document.querySelectorAll(selector).forEach(cb => cb.checked = savedValues.includes(cb.value));
        };
        setChecked('#dropdownMemory input', state.filterMemory);
        setChecked('#dropdownCategory input', state.filterCategory);
        setChecked('#dropdownTone input', state.filterTone);
        window.stashedGroups = state.filterGroup;
    } catch(e) {}
}

function updateGroupFilterOptions() {
    const groups = [...new Set(wordsData.map(item => item.group))].sort((a,b) => a-b);
    groupOptionsContainer.innerHTML = '';
    groups.forEach(g => {
        const label = document.createElement('label');
        label.className = 'dropdown-option';
        const isChecked = window.stashedGroups ? window.stashedGroups.includes(String(g)) : true;
        label.innerHTML = `<input type="checkbox" value="${g}" ${isChecked ? 'checked' : ''}> Group ${g}`;
        groupOptionsContainer.appendChild(label);
    });
    delete window.stashedGroups;
    updateDropdownLabels();
}

function shuffleArray(array) {
    let shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function getMemoryBadgeHTML(word) {
    const status = memoryScores[word] || 'unseen';
    if (status === 'known') return `<span class="mem-badge known">Known</span>`;
    if (status === 'delayed') return `<span class="mem-badge delayed">Delayed</span>`;
    if (status === 'unknown') return `<span class="mem-badge unknown">Don't Know</span>`;
    return `<span class="mem-badge unseen">Unseen</span>`;
}

// Fixed filter isolation routine (Clears out side-effects)
function getFilteredData() {
    const query = searchInput.value.toLowerCase().trim();
    const getChecked = (id) => Array.from(document.querySelectorAll(`#${id} input:checked`)).map(c => c.value);
    
    const selMem = getChecked('dropdownMemory');
    const selGrp = getChecked('dropdownGroup');
    const selCat = getChecked('dropdownCategory');
    const selTon = getChecked('dropdownTone');
    
    return wordsData.filter(item => {
        const wordStr = (item.word || '').toLowerCase();
        const defStr = (item.def || '').toLowerCase();
        const phraseStr = (item.phrase || '').toLowerCase();
        const contextStr = (item.context || '').toLowerCase();
        const synsArray = Array.isArray(item.syns) ? item.syns : [];
        const status = memoryScores[item.word] || 'unseen';
        
        const matchesSearch = query === "" || 
                              wordStr.includes(query) || 
                              defStr.includes(query) || 
                              phraseStr.includes(query) || 
                              contextStr.includes(query) ||
                              synsArray.some(s => s.toLowerCase().includes(query));
                              
        return matchesSearch && selMem.includes(status) && selGrp.includes(String(item.group)) && selCat.includes(item.cat || 'General') && selTon.includes(item.tone || 'neutral');
    });
}

function handleFilterExecution() {
    currentFlashcardIndex = 0;
    flashcardRevealed = false;
    closeAllDropdowns();
    updateDropdownLabels();
    
    let baseList = getFilteredData();
    currentFilteredList = isRandomized ? shuffleArray(baseList) : baseList;
    updateView();
}

function updateView() {
    const mode = modeFilter.value;
    const isStats = mode === 'statistics';
    statsSortFilter.style.display = isStats ? "inline-block" : "none";
    searchInput.disabled = btnRandom.disabled = btnApplyFilter.disabled = isStats;
    btnSessionSave.disabled = btnSessionLoad.disabled = isStats;
    document.querySelectorAll('.dropdown-button').forEach(b => b.disabled = isStats);

    displayContainer.innerHTML = '';
    if (wordsData.length === 0) {
        displayContainer.innerHTML = `<div class="no-results">Downloading vocabulary files...</div>`;
        return;
    }
    if (currentFilteredList.length === 0 && !isStats) {
        displayContainer.innerHTML = '<div class="no-results">No vocabulary words match your criteria parameters. Click "Apply Filters".</div>';
        return;
    }
    
    if (mode === 'study') renderStudyGrid();
    else if (mode === 'flashcard') {
        if (currentFlashcardIndex >= currentFilteredList.length) currentFlashcardIndex = 0;
        renderFlashcardLayout();
    }
    else if (mode === 'statistics') renderStatisticsDashboard();
    saveAppStateToBrowser();
}

async function rateFlashcard(word, rating) {
    memoryScores[word] = rating;
    saveAppStateToBrowser();
    moveFlashcard(1);
}

function renderFlashcardLayout() {
    displayContainer.innerHTML = '';
    const item = currentFilteredList[currentFlashcardIndex];
    const container = document.createElement('div');
    container.className = 'fc-container';
    const card = document.createElement('div');
    card.className = `fc-card ${flashcardRevealed ? 'revealed' : ''}`;
    const memBadgeHTML = getMemoryBadgeHTML(item.word);
    
    if (!flashcardRevealed) {
        card.innerHTML = `
            <div class="fc-front-title">${item.word}</div>
            <div class="gre-tags-row" style="justify-content:center !important;">${memBadgeHTML}</div>
            <div class="fc-hint">Group ${item.group} • Tap to reveal</div>
        `;
    } else {
        const synChips = (item.syns || []).map(s => `<span class="gre-chip">${s}</span>`).join('');
        card.innerHTML = `
            <div class="gre-card-header"><h3 class="gre-word" style="font-size: 24px;">${item.word}</h3><span class="gre-badge ${item.tone || 'neutral'}">${item.tone || 'neutral'}</span></div>
            <div class="gre-tags-row"><span class="gre-tag group-tag">Group ${item.group}</span><span class="gre-tag">${item.cat || 'General'}</span>${memBadgeHTML}</div>
            <p class="gre-def">${item.def || ''}</p><span class="gre-collocation">${item.phrase || ''}</span>
            <div class="gre-section-title">⚠️ How GRE Uses This Word</div><p class="gre-context-box">${item.context || ''}</p>
            <div class="gre-section-title">Mnemonic Trick</div><p class="gre-mnemonic">${item.mnem || ''}</p>
            <div class="gre-section-title">Mental Image</div><p class="gre-vis">${item.vis || ''}</p>
            <div class="gre-section-title">GRE Synonyms</div><div class="gre-chips">${synChips}</div>
        `;
    }
    
    card.addEventListener('click', () => {
        flashcardRevealed = !flashcardRevealed;
        renderFlashcardLayout();
    });
    
    if (flashcardRevealed) {
        const scoreRow = document.createElement('div');
        scoreRow.className = 'fc-score-row';
        const btnKnow = document.createElement('button'); btnKnow.className = 'score-btn know'; btnKnow.textContent = "Know";
        btnKnow.onclick = (e) => { e.stopPropagation(); rateFlashcard(item.word, 'known'); };
        const btnDelay = document.createElement('button'); btnDelay.className = 'score-btn delay'; btnDelay.textContent = "Time";
        btnDelay.onclick = (e) => { e.stopPropagation(); rateFlashcard(item.word, 'delayed'); };
        const btnDont = document.createElement('button'); btnDont.className = 'score-btn dont'; btnDont.textContent = "Don't";
        btnDont.onclick = (e) => { e.stopPropagation(); rateFlashcard(item.word, 'unknown'); };
        scoreRow.appendChild(btnKnow); scoreRow.appendChild(btnDelay); scoreRow.appendChild(btnDont);
        container.appendChild(card); container.appendChild(scoreRow);
    } else {
        container.appendChild(card);
    }
    
    const nav = document.createElement('div');
    nav.className = 'fc-navigation';
    const btnPrev = document.createElement('button'); btnPrev.className = 'fc-btn'; btnPrev.innerHTML = '← Prev';
    btnPrev.onclick = (e) => { e.stopPropagation(); moveFlashcard(-1); };
    const counter = document.createElement('div'); counter.className = 'fc-counter';
    counter.textContent = `${currentFlashcardIndex + 1} / ${currentFilteredList.length}`;
    const btnNext = document.createElement('button'); btnNext.className = 'fc-btn'; btnNext.innerHTML = 'Next →';
    btnNext.onclick = (e) => { e.stopPropagation(); moveFlashcard(1); };
    nav.appendChild(btnPrev); nav.appendChild(counter); nav.appendChild(btnNext);
    container.appendChild(nav);
    displayContainer.appendChild(container);
}

function renderStatisticsDashboard() {
    const grid = document.createElement('div');
    grid.className = 'stats-grid';
    const groupMap = {};
    
    wordsData.forEach(item => {
        if (!groupMap[item.group]) groupMap[item.group] = { group: item.group, total: 0, known: 0, delayed: 0, reviewNeeded: 0 };
        groupMap[item.group].total++;
        const status = memoryScores[item.word] || 'unseen';
        if (status === 'known') groupMap[item.group].known++;
        else if (status === 'delayed') groupMap[item.group].delayed++;
        else groupMap[item.group].reviewNeeded++;
    });

    let groupsArray = Object.values(groupMap);
    if (statsSortFilter.value === 'know') {
        groupsArray.sort((a, b) => (b.known / b.total) - (a.known / a.total));
    } else {
        groupsArray.sort((a, b) => (b.reviewNeeded / b.total) - (a.reviewNeeded / a.total));
    }

    groupsArray.forEach(g => {
        const card = document.createElement('div');
        card.className = 'stats-card';
        const knownRatio = g.known / g.total;
        const hue = Math.round(knownRatio * 140);
        card.style.backgroundColor = `hsl(${hue}, 45%, 96%)`;
        card.style.borderColor = `hsl(${hue}, 25%, 85%)`;
        
        card.innerHTML = `
            <h3 class="stats-group-title">Group ${g.group}</h3>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.05); margin: 2px 0;">
            <div class="stats-metric-row" style="color: #2a6f4d;"><span>Known:</span><span class="stats-val">${g.known}/${g.total} (${Math.round((g.known/g.total)*100)}%)</span></div>
            <div class="stats-metric-row" style="color: #b07000;"><span>Delayed:</span><span class="stats-val">${g.delayed}</span></div>
            <div class="stats-metric-row" style="color: #a63a00;"><span>Review:</span><span class="stats-val">${g.reviewNeeded}</span></div>
        `;
        
        card.addEventListener('click', () => openStatsGroupModal(g.group));
        grid.appendChild(card);
    });
    displayContainer.appendChild(grid);
}

function openStatsGroupModal(groupId) {
    lastActiveModalGroupId = groupId;
    modalGroupHeaderTitle.textContent = `📋 Group ${groupId} Breakdown`;
    modalHeaderActionZone.innerHTML = `<button class="modal-close-btn" onclick="closeStatsGroupModal()">×</button>`;
    modalGroupListBody.innerHTML = '';
    
    const groupWords = wordsData.filter(item => item.group === groupId).sort((a,b) => a.word.localeCompare(b.word));
    
    groupWords.forEach(item => {
        const status = memoryScores[item.word] || 'unseen';
        const row = document.createElement('div');
        row.className = `modal-word-row ${status}`;
        
        let readableStatus = "Unseen";
        if (status === 'known') readableStatus = "Known";
        if (status === 'delayed') readableStatus = "Delayed";
        if (status === 'unknown') readableStatus = "Don't Know";
        
        row.innerHTML = `
            <span class="modal-word-txt">${item.word}</span>
            <span class="modal-status-txt">${readableStatus}</span>
        `;
        
        row.addEventListener('click', () => renderDeepDiveWordCard(item));
        modalGroupListBody.appendChild(row);
    });
    
    statsGroupModal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeStatsGroupModal() {
    statsGroupModal.classList.remove('active');
    document.body.style.overflow = '';
}

statsGroupModal.addEventListener('click', (e) => {
    if (e.target === statsGroupModal) closeStatsGroupModal();
});

function moveFlashcard(direction) {
    flashcardRevealed = false;
    currentFlashcardIndex += direction;
    if (currentFlashcardIndex < 0) currentFlashcardIndex = currentFilteredList.length - 1;
    else if (currentFlashcardIndex >= currentFilteredList.length) currentFlashcardIndex = 0;
    updateView();
}

window.addEventListener('keydown', (e) => {
    if (modeFilter.value !== 'flashcard' || currentFilteredList.length === 0) return;
    if (e.key === 'ArrowLeft') moveFlashcard(-1);
    if (e.key === 'ArrowRight') moveFlashcard(1);
    if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault(); flashcardRevealed = !flashcardRevealed; renderFlashcardLayout();
    }
    if (flashcardRevealed) {
        const item = currentFilteredList[currentFlashcardIndex];
        if (e.key === '1') rateFlashcard(item.word, 'known');
        if (e.key === '2') rateFlashcard(item.word, 'delayed');
        if (e.key === '3') rateFlashcard(item.word, 'unknown');
    }
});

btnRandom.addEventListener('click', () => {
    isRandomized = !isRandomized;
    btnRandom.textContent = isRandomized ? "🔀 Random On" : "🔀 Random Off";
    btnRandom.classList.toggle('active', isRandomized);
    currentFlashcardIndex = 0; flashcardRevealed = false;
    currentFilteredList = isRandomized ? shuffleArray(currentFilteredList) : getFilteredData();
    updateView();
});

async function saveToCloudBlobs() {
    const user = userPinInput.value.trim() || "default_user";
    btnCloudSave.textContent = "⏳ Saving...";
    try {
        const response = await fetch(getApiUrl(user, "state"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ scores: memoryScores })
        });
        const textData = await response.text();
        let parsedData;
        try { parsedData = JSON.parse(textData); } catch(e) {}
        if (!response.ok) throw new Error(parsedData?.details || parsedData?.error || `HTTP Error ${response.status}`);
        alert(`Cloud save successful for: "${user}"!`);
    } catch(err) {
        alert("Cloud saving failed!\n\nDetails: " + err.message);
    } finally {
        btnCloudSave.textContent = "☁️ Save Progress";
    }
}

async function loadFromCloudBlobs() {
    const user = userPinInput.value.trim() || "default_user";
    btnCloudLoad.textContent = "⏳ Loading...";
    try {
        const response = await fetch(getApiUrl(user, "state"));
        const textData = await response.text();
        let parsedData;
        try { parsedData = JSON.parse(textData); } catch(e) {}
        if (!response.ok) throw new Error(parsedData?.details || parsedData?.error || `HTTP Error ${response.status}`);
        
        memoryScores = parsedData.scores || {};
        saveAppStateToBrowser();
        handleFilterExecution();
        alert(`Cloud data loaded for: "${user}"!`);
    } catch(err) {
        alert("Cloud loading failed!\n\nDetails: " + err.message);
    } finally {
        btnCloudLoad.textContent = "☁️ Load Progress";
    }
}

async function saveFullSessionConfigToCloud() {
    const user = userPinInput.value.trim() || "default_user";
    btnSessionSave.textContent = "⏳ Saving Config...";
    
    const getCheckedArray = (id) => Array.from(document.querySelectorAll(`#${id} .dropdown-content input[type="checkbox"]:checked`)).map(c => c.value);

    const configPayload = {
        searchText: searchInput.value,
        activeMode: modeFilter.value,
        randomStatusOn: isRandomized,
        flashcardIndex: currentFlashcardIndex,
        filterMemoryStates: getCheckedArray('dropdownMemory'),
        filterWordGroups: getCheckedArray('dropdownGroup'),
        filterCategories: getCheckedArray('dropdownCategory'),
        filterTones: getCheckedArray('dropdownTone'),
        wordSequenceLayout: currentFilteredList.map(item => item.word)
    };

    try {
        const response = await fetch(getApiUrl(user, "config"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(configPayload)
        });
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
        alert(`Master session configuration successfully saved under profile: "${user}"!`);
    } catch(err) {
        alert("Failed to save layout configuration parameters to cloud storage: " + err.message);
    } finally {
        btnSessionSave.textContent = "🔀 Save Session Config";
    }
}

async function loadFullSessionConfigFromCloud() {
    const user = userPinInput.value.trim() || "default_user";
    btnSessionLoad.textContent = "⏳ Restoring Config...";
    try {
        const response = await fetch(getApiUrl(user, "config"));
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
        
        const config = await response.json();
        
        // Exact target check logic bypasses overlapping blob files safely
        if (!config || !config.wordSequenceLayout) {
            alert(`No unified configuration blueprint exists yet for user profile: "${user}"`);
            return;
        }

        searchInput.value = config.searchText || "";
        modeFilter.value = config.activeMode || "study";
        isRandomized = !!config.randomStatusOn;
        currentFlashcardIndex = config.flashcardIndex || 0;
        flashcardRevealed = false;

        btnRandom.textContent = isRandomized ? "🔀 Random On" : "🔀 Random Off";
        btnRandom.classList.toggle('active', isRandomized);

        const applySynchronizedCheckboxes = (id, savedList) => {
            if (!savedList) return;
            document.querySelectorAll(`#${id} .dropdown-content input[type="checkbox"]`).forEach(cb => {
                cb.checked = savedList.includes(cb.value);
            });
        };
        applySynchronizedCheckboxes('dropdownMemory', config.filterMemoryStates);
        applySynchronizedCheckboxes('dropdownGroup', config.filterWordGroups);
        applySynchronizedCheckboxes('dropdownCategory', config.filterCategories);
        applySynchronizedCheckboxes('dropdownTone', config.filterTones);

        let alignedOrderedDeckList = [];
        (config.wordSequenceLayout || []).forEach(savedWord => {
            const match = wordsData.find(w => w.word === savedWord);
            if (match) alignedOrderedDeckList.push(match);
        });

        if (alignedOrderedDeckList.length > 0) {
            currentFilteredList = alignedOrderedDeckList;
        } else {
            let baseList = getFilteredData();
            currentFilteredList = isRandomized ? shuffleArray(baseList) : baseList;
        }

        closeAllDropdowns();
        updateDropdownLabels();
        updateView();
        
        alert(`Session configuration restored perfectly! Filters and randomness are now synchronized.`);
    } catch(err) {
        alert("Could not pull alignment blueprint data from server: " + err.message);
    } finally {
        btnSessionLoad.textContent = "🔀 Load Session Config";
    }
}

async function autoScanServerWordLists() {
    let freshWords = [];
    const scanPromises = [];
    for (let i = 1; i <= 30; i++) {
        const fileName = `g${i}.json`;
        const fetchPromise = fetch(`././${fileName}`)
            .then(async (response) => {
                if (response.ok) {
                    const parsed = await response.json();
                    if (parsed.group && Array.isArray(parsed.cards)) {
                        freshWords = [...freshWords, ...parsed.cards.map(c => ({ ...c, group: parseInt(parsed.group) }))];
                    }
                }
            })
            .catch(() => {});
        scanPromises.push(fetchPromise);
    }
    await Promise.all(scanPromises);
    wordsData = freshWords;
    updateGroupFilterOptions();
    
    document.querySelectorAll('#dropdownGroup input[type="checkbox"]').forEach(cb => cb.checked = true);
    
    let baseList = getFilteredData();
    currentFilteredList = isRandomized ? shuffleArray(baseList) : baseList;
    updateView();
}

async function initApp() {
    loadAppStateFromBrowser();
    await autoScanServerWordLists();
}
